<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail suraj form :</title>
</head>

<body>
    <form>

        <label>Name:</label>
        <input type="text" placeholder="Enter Name" required>

        <br><br>

        <label>Email:</label>
        <input type="email" required>

        <br><br>

        <label>Password:</label>
        <input type="password">

        <br><br>

        <label>Gender:</label>

        <input type="radio" name="gender"> Male

        <input type="radio" name="gender"> Female

        <br><br>

        <label>Hobbies:</label>

        <input type="checkbox"> Cricket

        <input type="checkbox"> Coding

        <br><br>

        <label>Branch:</label>

        <select>

            <option>CSE</option>

            <option>IT</option>

            <option>ECE</option>

        </select>

        <br><br>

        <textarea placeholder="Write Feedback"></textarea>

        <br><br>

        <input type="submit">

    </form>
</body>

</html>
